<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card Layout</title>
</head>
<body>
    <!-- Product Card Start -->
     <div class="product-card">
        <img src="https://via.placeholder.com/300x200" alt="Product Image">

        <h2 class="product-title">Cool Headphones</h2>

        <p class="product-price">₹1,999</p>

        <p class="product-description">Lightweight, clear sound, and comfy for long listening sessions.</p>

        <button class="buy-button">Add To Cart</button>
        <!-- Product Card End -->
     </div>
</body>
</html>
